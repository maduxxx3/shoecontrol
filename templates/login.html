<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | ShoeControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #111111, #2b2b2b);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 100%;
            max-width: 430px;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }

        .logo-box {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: #111111;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 22px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-box">SC</div>
        <h2 class="fw-bold">Entrar no sistema</h2>
        <p class="text-muted mb-4">Acesse o ShoeControl</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for categoria, msg in messages %}
                    <div class="alert alert-{{ categoria }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" name="email" class="form-control form-control-lg" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control form-control-lg" required>
            </div>

            <button class="btn btn-dark w-100 btn-lg rounded-3">Entrar</button>
        </form>

        <div class="mt-4 small text-muted">
            Login inicial: <strong>admin@shoecontrol.com</strong><br>
            Senha inicial: <strong>123456</strong>
        </div>
    </div>
</body>
</html>
