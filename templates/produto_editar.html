{% extends 'base.html' %}

{% block content %}

<div class="mb-4">
    <h2 class="fw-bold">Editar Produto</h2>
    <p class="text-muted mb-0">Atualize as informações do produto</p>
</div>

<div class="page-card">
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nome</label>
                <input type="text" name="nome" class="form-control" value="{{ produto.nome }}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Marca</label>
                <input type="text" name="marca" class="form-control" value="{{ produto.marca }}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Categoria</label>
                <input type="text" name="categoria" class="form-control" value="{{ produto.categoria }}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Tamanho</label>
                <input type="text" name="tamanho" class="form-control" value="{{ produto.tamanho }}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Cor</label>
                <input type="text" name="cor" class="form-control" value="{{ produto.cor }}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Quantidade</label>
                <input type="number" name="quantidade" class="form-control" value="{{ produto.quantidade }}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Preço de Custo</label>
                <input type="number" step="0.01" name="preco_custo" class="form-control" value="{{ produto.preco_custo }}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Preço de Venda</label>
                <input type="number" step="0.01" name="preco_venda" class="form-control" value="{{ produto.preco_venda }}">
            </div>
        </div>

        <div class="mt-4">
            <button class="btn btn-dark">Salvar Alterações</button>
            <a href="{{ url_for('produtos') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>

{% endblock %}
