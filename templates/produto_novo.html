{% extends 'base.html' %}

{% block content %}

<h2>Novo Produto</h2>

<form method="POST">
    <div class="row">

        <div class="col-md-6 mb-3">
            <label>Nome</label>
            <input type="text" name="nome" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
            <label>Marca</label>
            <input type="text" name="marca" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label>Categoria</label>
            <input type="text" name="categoria" class="form-control">
        </div>

        <div class="col-md-3 mb-3">
            <label>Tamanho</label>
            <input type="text" name="tamanho" class="form-control">
        </div>

        <div class="col-md-3 mb-3">
            <label>Cor</label>
            <input type="text" name="cor" class="form-control">
        </div>

        <div class="col-md-4 mb-3">
            <label>Quantidade</label>
            <input type="number" name="quantidade" class="form-control">
        </div>

        <div class="col-md-4 mb-3">
            <label>Preço Custo</label>
            <input type="number" step="0.01" name="preco_custo" class="form-control">
        </div>

        <div class="col-md-4 mb-3">
            <label>Preço Venda</label>
            <input type="number" step="0.01" name="preco_venda" class="form-control">
        </div>

    </div>

    <button class="btn btn-dark">Salvar</button>

</form>

{% endblock %}
